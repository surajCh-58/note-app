<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if instance.pk %}Edit note{% else %}New note{% endif %} — NoteKeep</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"DM Serif Display"', 'serif'],
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-900 font-sans text-slate-100 min-h-screen flex items-center justify-center p-6">

  <div class="w-full max-w-lg">

    <!-- Back link -->
    <a href="{% url 'Note:dashboard' %}"
       class="inline-flex items-center gap-2 text-slate-400 hover:text-slate-200 text-sm transition mb-6">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
      </svg>
      Back to dashboard
    </a>

    <!-- Card -->
    <div class="bg-slate-800 border border-slate-700 rounded-2xl p-8 shadow-xl shadow-slate-900/50">

      <h1 class="font-display text-3xl text-white mb-6">
        {% if instance.pk %}Edit note{% else %}New note{% endif %}
      </h1>

      <form method="POST" class="space-y-5">
        {% csrf_token %}
        {% for field in form %}
        <div>
          {% if field.label %}
          <label class="block text-sm font-medium text-slate-300 mb-1.5">{{ field.label }}</label>
          {% endif %}
          {{ field }}
          {% if field.errors %}
          <p class="mt-1 text-xs text-red-400">{{ field.errors|join:", " }}</p>
          {% endif %}
        </div>
        {% endfor %}

        <div class="flex gap-3 pt-2">
          <button type="submit"
            class="flex-1 bg-amber-400 hover:bg-amber-300 text-slate-900 font-semibold rounded-lg py-2.5 text-sm transition duration-150">
            {% if instance.pk %}Save changes{% else %}Save note{% endif %}
          </button>
          <a href="{% url 'Note:dashboard' %}"
             class="flex-1 text-center bg-slate-700 hover:bg-slate-600 text-slate-200 font-medium rounded-lg py-2.5 text-sm transition duration-150">
            Cancel
          </a>
        </div>
      </form>
    </div>
  </div>

</body>
</html>
